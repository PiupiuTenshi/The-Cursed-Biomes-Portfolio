<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Reader</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070b;
        --panel: rgba(13, 15, 24, 0.92);
        --line: rgba(120, 92, 180, 0.34);
        --text: #f5f1ff;
        --muted: #b9aecb;
        --cyan: #46e2ff;
        --violet: #b877ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 20% 0%, rgba(184, 119, 255, 0.16), transparent 30%),
          var(--bg);
        background-size: 18px 18px, 18px 18px, 100% 100%, 100% 100%;
        font-family: "DeArPix", "Courier New", monospace;
      }

      .reader-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 7, 11, 0.9);
        backdrop-filter: blur(14px);
      }

      .reader-title {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reader-controls {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      button {
        min-width: 42px;
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(70, 226, 255, 0.34);
        border-radius: 8px;
        color: var(--text);
        background: linear-gradient(180deg, rgba(70, 226, 255, 0.12), rgba(184, 119, 255, 0.16));
        cursor: pointer;
        font: inherit;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.45;
      }

      .reader-pages {
        display: grid;
        gap: 18px;
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 18px 12px 30px;
      }

      .page {
        display: grid;
        gap: 8px;
      }

      .page-label {
        color: var(--muted);
        font-size: 0.78rem;
      }

      canvas {
        width: 100%;
        height: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }

      .reader-status {
        width: min(100%, 720px);
        margin: 18vh auto 0;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: var(--panel);
        text-align: center;
      }

      @media (max-width: 640px) {
        .reader-bar {
          align-items: stretch;
          flex-direction: column;
        }

        .reader-controls {
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header class="reader-bar">
      <div class="reader-title" data-title>Đang mở sách...</div>
      <div class="reader-controls">
        <button type="button" data-zoom-out aria-label="Thu nhỏ">-</button>
        <button type="button" data-zoom-in aria-label="Phóng to">+</button>
        <button type="button" data-fit aria-label="Vừa màn hình">Fit</button>
        <button type="button" data-reload aria-label="Tải lại">Reload</button>
      </div>
    </header>
    <main>
      <div class="reader-status" data-status>Đang tải PDF...</div>
      <div class="reader-pages" data-pages hidden></div>
    </main>

    <script type="module" src="reader.js"></script>
  </body>
</html>
