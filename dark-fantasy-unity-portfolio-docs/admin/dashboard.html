<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - The Cursed Biomes</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <div>
        <p class="eyebrow">Hidden admin</p>
        <h1>The Cursed Biomes Dashboard</h1>
      </div>
      <button type="button" data-logout>Logout</button>
    </header>

    <main class="dashboard-grid">
      <section class="kpis">
        <article>
          <span>Unread</span>
          <strong data-kpi-unread>0</strong>
        </article>
        <article>
          <span>Messages</span>
          <strong data-kpi-messages>0</strong>
        </article>
        <article>
          <span>Events</span>
          <strong data-kpi-events>0</strong>
        </article>
        <article>
          <span>Sessions</span>
          <strong data-kpi-sessions>0</strong>
        </article>
        <article>
          <span>Audit</span>
          <strong data-kpi-audit>0</strong>
        </article>
      </section>

      <section class="admin-card span-2" id="messages">
        <div class="card-head">
          <h2>Chat Messages</h2>
          <button type="button" data-refresh>Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Contact</th>
                <th>Message</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody data-messages-body></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card span-2">
        <div class="card-head">
          <h2>Visitor Events</h2>
          <button type="button" data-clear-event-filters>Clear Filters</button>
        </div>
        <form class="filter-grid" data-event-filters>
          <label>
            <span>Search</span>
            <input name="q" placeholder="event, metadata, user agent..." />
          </label>
          <label>
            <span>Event Type</span>
            <select name="eventType" data-event-type-filter>
              <option value="">All types</option>
            </select>
          </label>
          <label>
            <span>Date From</span>
            <input name="dateFrom" type="date" />
          </label>
          <label>
            <span>Date To</span>
            <input name="dateTo" type="date" />
          </label>
          <label>
            <span>Path</span>
            <input name="path" placeholder="/" />
          </label>
          <label>
            <span>IP</span>
            <input name="ip" placeholder="127.0.0.1" />
          </label>
          <label>
            <span>Session</span>
            <input name="sessionId" placeholder="sess_..." />
          </label>
          <label>
            <span>Repo</span>
            <input name="repoName" placeholder="TechWeb-2026" />
          </label>
          <label>
            <span>Sort</span>
            <select name="sort">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
            </select>
          </label>
          <label>
            <span>Limit</span>
            <input name="limit" type="number" min="1" max="500" value="100" />
          </label>
        </form>
        <div class="analytics-summary" data-events-summary></div>
        <div class="feed" data-events-feed></div>
      </section>

      <section class="admin-card">
        <h2>Repo Visibility Seed</h2>
        <div class="feed" data-repos-feed></div>
      </section>

      <section class="admin-card span-2">
        <h2>Audit Log</h2>
        <div class="feed" data-audit-feed></div>
      </section>
    </main>

    <script src="/admin/dashboard.js" defer></script>
  </body>
</html>
